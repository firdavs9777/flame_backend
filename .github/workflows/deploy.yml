name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu/flame_backend

            # Remember the SHA we're running so we can roll back.
            PREV_SHA=$(git rev-parse HEAD)
            echo "Currently deployed: $PREV_SHA"

            git fetch origin main
            NEW_SHA=$(git rev-parse origin/main)
            echo "Deploying:          $NEW_SHA"

            git reset --hard "$NEW_SHA"

            # Build and roll
            docker compose build app
            docker compose up -d app
            docker compose exec -T nginx nginx -s reload

            # Health check (12 * 5s = 60s)
            DEPLOY_OK=0
            for i in $(seq 1 12); do
              if curl -sf https://api.flame.banatalk.com/health > /dev/null; then
                DEPLOY_OK=1
                echo "Health check passed on attempt $i"
                break
              fi
              sleep 5
            done

            if [ "$DEPLOY_OK" -ne 1 ]; then
              echo "Health check FAILED — rolling back to $PREV_SHA"
              git reset --hard "$PREV_SHA"
              docker compose build app
              docker compose up -d app
              exit 1
            fi

            docker image prune -f
